name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Root module
        shell: bash
        run: |
          go vet ./...
          go test ./...
          go build ./...
      - name: cmd/iv module
        shell: bash
        working-directory: cmd/iv
        run: |
          go vet ./...
          go test ./...
          go build ./...

  cross:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build root module
        run: go build ./...
      - name: Build cmd/iv module
        working-directory: cmd/iv
        run: go build ./...

  tags:
    name: Build tags
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/iv
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: minimal
        run: go build -tags minimal .
      - name: nodynamic
        run: go build -tags nodynamic .

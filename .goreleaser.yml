version: 2

project_name: iv

git:
  ignore_tags:
    - 'cmd/iv/*'

before:
  hooks:
    - go mod download

builds:
  - id: iv-linux-amd64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: &env
      - CGO_ENABLED=0
    flags: &flags
      - "-trimpath"
    ldflags: &ldflags
      - "-s -w"
    tags: &tags
      - nodynamic
    goos:
      - linux
    goarch:
      - amd64

  - id: iv-linux-arm64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    tags: *tags
    goos:
      - linux
    goarch:
      - arm64

  - id: iv-windows-amd64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    goos:
      - windows
    goarch:
      - amd64

  - id: iv-darwin-amd64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    goos:
      - darwin
    goarch:
      - amd64

  - id: iv-darwin-arm64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    goos:
      - darwin
    goarch:
      - arm64

  - id: iv-freebsd-amd64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    tags: *tags
    goos:
      - freebsd
    goarch:
      - amd64

  - id: iv-openbsd-amd64
    binary: "{{ .ProjectName }}"
    main: ./cmd/iv/
    env: *env
    flags: *flags
    ldflags: *ldflags
    tags: *tags
    goos:
      - openbsd
    goarch:
      - amd64

archives:
  - id: archive
    wrap_in_directory: "{{ .ProjectName }}-{{ .Version }}"
    name_template: >-
      {{- .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
      - goos: darwin
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-dev"

changelog:
  sort: asc
  use: git
  filters:
    include:
      - '^feat(\(.+\))?!?:'
      - '^fix(\(.+\))?!?:'
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
